<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 训练平台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h1>AI 训练平台</h1>
                <span class="version">v0.1.0</span>
            </div>
            <ul class="nav-list">
                <li data-page="dashboard" class="active">
                    <span class="nav-icon">📊</span> 总览
                </li>
                <li data-page="pools">
                    <span class="nav-icon">🗂️</span> 资源池
                </li>
                <li data-page="nodes">
                    <span class="nav-icon">🖥️</span> GPU 节点
                </li>
                <li data-page="tasks">
                    <span class="nav-icon">📋</span> 训练任务
                </li>
                <li data-page="audit">
                    <span class="nav-icon">📝</span> 审计日志
                </li>
                <li data-page="costs">
                    <span class="nav-icon">💰</span> 费用管理
                </li>
            </ul>
            <div class="sidebar-footer">
                <div class="status-indicator" id="statusIndicator">
                    <span class="status-dot"></span>
                    <span id="statusText">系统在线</span>
                </div>
            </div>
        </nav>
        <main class="content">
            <header class="content-header">
                <h2 id="pageTitle">总览</h2>
                <div class="header-actions">
                    <button class="btn btn-sm" onclick="refreshCurrentPage()">🔄 刷新</button>
                </div>
            </header>
            <div class="content-body" id="pageContent">
                <!-- Dynamic content loaded here -->
            </div>
        </main>
    </div>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
